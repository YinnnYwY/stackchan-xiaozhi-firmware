name: Build CoreS3 (StackChan-XiaoZhi)

on:
  push:
    branches: [main, codex-refactor]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "*"

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Stash author's customized HTML + clean managed_components
        shell: bash
        run: |
          # 作者把 78__esp-wifi-connect/assets/*.html 直接 commit 进 repo（在
          # managed_components/ 这个本应 .gitignore 的路径下），但没附带 .component_hash
          # 等 metadata，导致 IDF component manager 拒绝复用、又不肯重下。
          # 这里把作者改过的 HTML 暂存出来，删整个 managed_components/，让 idf.py 重下，
          # 然后再覆盖回作者的 HTML。
          mkdir -p /tmp/stash-wifi-html
          if [ -d managed_components/78__esp-wifi-connect/assets ]; then
            cp -r managed_components/78__esp-wifi-connect/assets/* /tmp/stash-wifi-html/ 2>/dev/null || true
          fi
          rm -rf managed_components

      - name: Build StackChan-XiaoZhi
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          # 第一遍：让 component manager 重新下 78__esp-wifi-connect 拿全 metadata
          idf.py reconfigure || true
          # 把作者改过的 HTML 覆盖回来（component manager 不会校验 assets 内容）
          if [ -d managed_components/78__esp-wifi-connect/assets ] && [ -d /tmp/stash-wifi-html ]; then
            cp -r /tmp/stash-wifi-html/* managed_components/78__esp-wifi-connect/assets/ || true
          fi
          idf.py build

      - name: Pack flash artifacts
        shell: bash
        run: |
          mkdir -p out
          cp build/bootloader/bootloader.bin out/
          cp build/partition_table/partition-table.bin out/
          cp build/ota_data_initial.bin out/
          cp build/xiaozhi.bin out/
          # srmodels (wake word) is critical
          cp build/srmodels/srmodels.bin out/ 2>/dev/null || true
          . $IDF_PATH/export.sh
          esptool.py --chip esp32s3 merge_bin -o out/merged-binary.bin \
            --flash_mode dio --flash_size 16MB --flash_freq 80m \
            0x0       build/bootloader/bootloader.bin \
            0x8000    build/partition_table/partition-table.bin \
            0xd000    build/ota_data_initial.bin \
            0x10000   build/srmodels/srmodels.bin \
            0x410000  build/xiaozhi.bin || true
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: stackchan-xiaozhi-cores3-${{ github.sha }}
          path: out/
          retention-days: 14
